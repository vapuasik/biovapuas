<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vapuas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#000;color:#fff;overflow:hidden}
#bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;pointer-events:none;filter:blur(10px);transform:scale(1.05)}
#start{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:40;cursor:pointer;transition:opacity .6s}
#start.hide{opacity:0;pointer-events:none}
#start p{font-size:22px;color:rgba(255,255,255,.7);text-align:center;letter-spacing:.12em}
#start span{display:block;font-size:12px;margin-top:8px;color:rgba(255,255,255,.3);letter-spacing:.3em}

#card{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:560px;
  background:linear-gradient(to top right,rgba(68,68,68,.36),rgba(78,78,78,.36),rgba(118,128,120,.36));
  padding:22px 24px 18px;border-radius:16px;z-index:20;
  display:flex;flex-direction:column;gap:14px;
  backdrop-filter:blur(13px);-webkit-backdrop-filter:blur(13px);
  opacity:0;transition:opacity .7s,transform .08s linear;
  transform-style:preserve-3d;will-change:transform;
  overflow:hidden;
}
#card.on{opacity:1}

/* glare layer */
#glare{
  position:absolute;inset:0;border-radius:16px;
  background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.18) 0%, transparent 65%);
  pointer-events:none;opacity:0;transition:opacity .15s;
  mix-blend-mode:overlay;
}

.row{display:flex;align-items:flex-start;gap:16px;position:relative;z-index:1}
.ava{width:100px;height:100px;border-radius:50%;object-fit:cover;flex-shrink:0}
.info{flex:1;display:flex;flex-direction:column;gap:6px;padding-top:4px}
#name{font-size:28px;font-weight:bold;letter-spacing:2px;color:#fff;filter:drop-shadow(0 0 8px rgba(255,255,255,.55));min-height:38px}
#bio{color:rgba(255,255,255,.5);font-size:13px;line-height:1.6}
.sep{width:100%;height:1px;background:rgba(255,255,255,.15);position:relative;z-index:1}
.socials{display:flex;justify-content:center;gap:28px;padding:4px 0 2px;position:relative;z-index:1}
.s{display:flex;align-items:center;text-decoration:none;color:rgba(255,255,255,.6);transition:color .25s,transform .25s cubic-bezier(.34,1.56,.64,1)}
.s svg{width:28px;height:28px;fill:currentColor;filter:drop-shadow(0 0 5px rgba(255,255,255,.4));transition:filter .25s}
.s:hover{color:#fff;transform:translateY(-7px)}
.s:hover svg{filter:drop-shadow(0 0 12px rgba(255,255,255,.95))}

#player{
  position:fixed;bottom:calc(50% - 152px);left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;z-index:20;
  padding:7px 16px;border-radius:20px;
  backdrop-filter:blur(6px);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  opacity:0;transition:opacity .7s .3s
}
#player.on{opacity:1}
.vol{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.45)}
.vol svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
input[type=range]{-webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:3px;background:rgba(255,255,255,.22);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.85);cursor:pointer}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(10px);color:#fff;padding:7px 20px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .3s,transform .3s;z-index:50}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){#card{width:92vw;padding:16px}.ava{width:80px;height:80px}#name{font-size:22px}#player{bottom:18px}}
</style>
</head>
<body>

<div id="start" onclick="go()">
  <p>click to enter<span>[ vapuas ]</span></p>
</div>

<video id="bg" autoplay loop muted playsinline>
  <source src="background.mp4" type="video/mp4">
</video>

<div id="card">
  <div id="glare"></div>
  <div class="row">
    <img class="ava" src="avatar.webp" alt="">
    <div class="info">
      <div id="name"></div>
      <div id="bio">sleep</div>
    </div>
  </div>

  <div class="socials">

    </a>
  </div>
</div>

<div id="player">
  <div class="vol">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <input type="range" min="0" max="1" step="0.01" value="0.3" oninput="av.volume=this.value">
  </div>
</div>

<div id="toast">discord скопирован</div>
<audio id="a" src="music.m4a" loop></audio>

<script>
const av=document.getElementById('a');

function go(){
  document.getElementById('start').classList.add('hide');
  setTimeout(()=>{
    document.getElementById('card').classList.add('on');
    document.getElementById('player').classList.add('on');
    let i=0,n=document.getElementById('name'),s='vapuas';
    const t=setInterval(()=>{n.textContent+=s[i++];if(i>=s.length)clearInterval(t)},80);
    av.volume=0.3;av.play().catch(()=>{});
  },350);
}

function dc(e){
  e.preventDefault();
  navigator.clipboard.writeText('vapuas').then(()=>{
    const t=document.getElementById('toast');
    t.classList.add('on');
    setTimeout(()=>t.classList.remove('on'),1800);
  });
}

// smooth 3D tilt with glare
const card=document.getElementById('card');
const glare=document.getElementById('glare');
let cx=0,cy=0,tx=0,ty=0,raf=null;

card.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  tx=((e.clientX-r.left)/r.width-.5)*22;
  ty=-((e.clientY-r.top)/r.height-.5)*16;
  const gx=(e.clientX-r.left)/r.width*100;
  const gy=(e.clientY-r.top)/r.height*100;
  glare.style.background=`radial-gradient(circle at ${gx}% ${gy}%, rgba(255,255,255,.22) 0%, transparent 60%)`;
  glare.style.opacity='1';
  if(!raf) raf=requestAnimationFrame(animate);
});

card.addEventListener('mouseleave',()=>{
  tx=0;ty=0;
  glare.style.opacity='0';
  if(!raf) raf=requestAnimationFrame(animate);
});

function animate(){
  cx+=(tx-cx)*.12;
  cy+=(ty-cy)*.12;
  card.style.transform=`translate(-50%,-50%) perspective(900px) rotateY(${cx}deg) rotateX(${cy}deg) scale(${Math.abs(cx)+Math.abs(cy)>0.5?1.02:1})`;
  if(Math.abs(tx-cx)<0.01&&Math.abs(ty-cy)<0.01){raf=null;return;}
  raf=requestAnimationFrame(animate);
}
</script>
